{% extends 'base.html' %}

{% block title %}Inicio — Variedades{% endblock %}

{% block content %}
<div class="text-center">
    <h1>Variedades La Divina Providencia</h1>
    <p class="lead">Sistema de registro de ventas, compras y gastos</p>
    <hr>
    <div class="row mt-5">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Ventas</h5>
                    <p class="card-text">Registrar ventas del día</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Gastos</h5>
                    <p class="card-text">Registrar gastos operativos</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Reportes</h5>
                    <p class="card-text">Flujo de caja del día</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
