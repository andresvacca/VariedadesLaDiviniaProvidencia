{% extends 'base.html' %}

{% block title %}Eliminar artículo — Variedades{% endblock %}

{% block content %}
<h1>Eliminar artículo</h1>
<p>¿Estás seguro de eliminar "{{ object }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'products:articulo_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
