{% extends 'base.html' %}

{% block title %}Categorías — Variedades{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Categorías</h1>
    <a href="{% url 'products:categoria_create' %}" class="btn btn-primary">Nueva categoría</a>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for categoria in categorias %}
        <tr>
            <td>{{ categoria.nombre }}</td>
            <td>
                <a href="{% url 'products:categoria_update' categoria.pk %}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{% url 'products:categoria_delete' categoria.pk %}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No hay categorías registradas.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
